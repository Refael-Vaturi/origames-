name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install Dependencies
      run: npm install --force

    - name: Build Web Project
      run: npm run build --if-present

    - name: Initialize Capacitor iOS From Scratch
      run: |
        npm install @capacitor/core @capacitor/cli @capacitor/ios --force
        npx cap init "Ori Games" "com.ori.origamesnew" --web-dir dist
        npx cap add ios
        npx cap update ios
        npx cap sync ios

    - name: Build Xcode Project (Unsigned)
      run: |
        cd ios/App
        # כאן שינינו ל-clean build באותיות קטנות
        xcodebuild -project App.xcodeproj -scheme App -sdk iphoneos -configuration Release CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO clean build
        
        mkdir -p $GITHUB_WORKSPACE/build/Payload
        cp -r build/Release-iphoneos/App.app $GITHUB_WORKSPACE/build/Payload/ || cp -r /Users/runner/Library/Developer/Xcode/DerivedData/*/Build/Products/Release-iphoneos/App.app $GITHUB_WORKSPACE/build/Payload/
        cd $GITHUB_WORKSPACE/build
        zip -r ios-app.ipa Payload

    - name: Upload Finished IPA
      uses: actions/upload-artifact@v4
      with:
        name: ios-app-ipa
        path: build/ios-app.ipa
