name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install Dependencies
      run: npm install --force

    - name: Build Web Project
      run: npm run build --if-present

    - name: Initialize Capacitor iOS From Scratch
      run: |
        npm install @capacitor/core @capacitor/cli @capacitor/ios --force
        npx cap init "Ori Games" "com.ori.origamesnew" --web-dir dist
        npx cap add ios
        npx cap update ios
        npx cap sync ios

    - name: Build Xcode Project (Unsigned)
      run: |
        cd ios/App
        # משתמשים ב-project במקום ב-workspace עבור הגרסאות החדשות של קפסיטור
        xcodebuild -project App.xcodeproj -scheme App -sdk iphoneos -configuration Release CODE_SIGNING_ALLOWED=NO -archivePath $PWD/build/App.xcarchive archive
        mkdir -p $GITHUB_WORKSPACE/build
        xcrun xcodebuild -exportArchive -archivePath $PWD/build/App.xcarchive -exportPath $GITHUB_WORKSPACE/build -exportOptionsPlst <(echo '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>method</key><string>ad-hoc</string><key>compileBitcode</key><false/></dict></plist>')

    - name: Upload Finished IPA
      uses: actions/upload-artifact@v4
      with:
        name: ios-app-ipa
        path: build/*.ipa
